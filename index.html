<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>认识AI · 入门水平测试卷 | 与AI同行</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f6f2ff 0%, #ede9fe 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            color: #1a2c3e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 卡片样式 */
        .paper-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(56, 24, 120, 0.18), 0 1px 3px rgba(0,0,0,0.05);
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .glass-glow {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 10% 8%, rgba(124, 58, 237, 0.12), transparent 36%),
                radial-gradient(circle at 92% 0%, rgba(167, 139, 250, 0.14), transparent 32%),
                rgba(255,255,255,0.94);
            border: 1px solid rgba(124, 58, 237, 0.2);
            box-shadow: 0 24px 46px -18px rgba(76, 29, 149, 0.26), 0 4px 12px rgba(76, 29, 149, 0.08);
            backdrop-filter: blur(10px);
        }

        .glass-glow::after {
            content: "";
            position: absolute;
            right: -90px;
            top: -90px;
            width: 210px;
            height: 210px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(196, 181, 253, 0.4) 0%, rgba(196, 181, 253, 0) 72%);
            pointer-events: none;
        }

        .cover-card {
            text-align: center;
            padding: 2.6rem 2rem 2.3rem;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 12% 12%, rgba(124, 58, 237, 0.16), transparent 36%),
                radial-gradient(circle at 88% 0%, rgba(167, 139, 250, 0.18), transparent 34%),
                rgba(255,255,255,0.97);
            border: 1px solid rgba(124, 58, 237, 0.24);
            box-shadow: 0 24px 46px -16px rgba(76, 29, 149, 0.28), 0 4px 12px rgba(76, 29, 149, 0.08);
        }

        .cover-card::after {
            content: "";
            position: absolute;
            right: -90px;
            top: -90px;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(196, 181, 253, 0.45) 0%, rgba(196, 181, 253, 0) 72%);
            pointer-events: none;
        }

        /* 使用「封面页.png」作为主视觉时：底图 + 叠加输入区 */
        .cover-card.cover-visual-only {
            padding: 0;
            text-align: left;
            background: transparent;
            border: none;
            box-shadow: none;
            overflow: visible;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        .cover-card.cover-visual-only::after {
            display: none;
        }

        .cover-card.cover-visual-only .cover-brand-stack {
            display: none;
        }

        .cover-art-wrap {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            line-height: 0;
            box-shadow: 0 24px 46px -18px rgba(76, 29, 149, 0.26), 0 4px 12px rgba(76, 29, 149, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .cover-art-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .cover-input-layer {
            --cover-pad-x: 7%;
            --cover-pad-b: 17%;
            --cover-gap: 0.65rem;
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 0 var(--cover-pad-x) var(--cover-pad-b);
            pointer-events: none;
        }

        .cover-input-layer * {
            pointer-events: auto;
        }

        .cover-card.cover-visual-only .student-form {
            max-width: 46%;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--cover-gap);
            align-items: end;
            margin-left: auto;
            margin-right: auto;
        }

        .cover-card.cover-visual-only .field-full {
            grid-column: 1 / -1;
        }

        .cover-card.cover-visual-only .form-field label {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .cover-card.cover-visual-only .form-field input {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(124, 58, 237, 0.35);
            box-shadow: 0 6px 16px rgba(76, 29, 149, 0.12);
            font-weight: 600;
            text-align: center;
        }

        .cover-card.cover-visual-only .form-field input::placeholder {
            text-align: center;
        }

        .cover-card.cover-visual-only #enterExamBtn {
            width: 52%;
            min-width: 190px;
            margin-top: 0.35rem;
        }

        .cover-card.cover-visual-only .entry-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cover-card.cover-visual-only .entry-tip {
            text-align: center;
        }

        .brand-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.38rem 0.9rem;
            border-radius: 999px;
            border: 1px solid #d8b4fe;
            color: #6d28d9;
            background: rgba(248, 245, 255, 0.92);
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 0.95rem;
            letter-spacing: 0.2px;
        }

        .cover-title {
            font-size: 2.35rem;
            background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 45%, #8b5cf6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            margin-bottom: 0.45rem;
            letter-spacing: 0.4px;
        }

        .cover-subtitle {
            color: #5b6280;
            margin-bottom: 0.9rem;
            font-size: 1.03rem;
            font-weight: 600;
        }

        .cover-desc {
            margin: 0 auto 1.5rem;
            max-width: 640px;
            color: #5f6376;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .cover-meta-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .cover-meta-item {
            background: #f5f3ff;
            border: 1px solid #ddd6fe;
            color: #5b21b6;
            border-radius: 999px;
            padding: 0.22rem 0.78rem;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .student-form {
            max-width: 520px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.9rem;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 0.35rem;
        }

        .form-field label {
            font-size: 0.9rem;
            color: #2c5a7a;
            font-weight: 600;
        }

        .form-field input {
            width: 100%;
            border: 1px solid #cbdde9;
            border-radius: 0.8rem;
            padding: 0.68rem 0.8rem;
            font-size: 1rem;
            color: #1a2c3e;
            background: #fff;
        }

        .form-field input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .field-full {
            grid-column: 1 / -1;
        }

        .entry-actions {
            margin-top: 0.3rem;
            text-align: center;
        }

        .entry-tip {
            margin-top: 0.8rem;
            color: #b45309;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        .student-info {
            margin-top: 1rem;
            color: #5b21b6;
            font-weight: 600;
            text-align: center;
        }

        .mission-text {
            margin-top: 0.9rem;
            color: #5b21b6;
            font-weight: 700;
            background: #f3e8ff;
            border-left: 4px solid #7c3aed;
            padding: 0.7rem 0.9rem;
            border-radius: 0.7rem;
            text-align: center;
        }

        .exam-header {
            text-align: center;
        }

        .exam-header h1 {
            justify-content: center;
            width: 100%;
        }

        .exam-header .sub {
            border-left: none;
            padding-left: 0;
            line-height: 1.8;
        }

        .score-line {
            display: block;
            color: #6d28d9;
            font-weight: 700;
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.45rem;
        }

        .exam-title-sep {
            margin: 0 0.35rem;
        }

        #examSection {
            display: none;
            padding-bottom: 120px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sub {
            color: #4b6f8c;
            border-left: 4px solid #7c3aed;
            padding-left: 1rem;
            margin: 0.5rem 0 1rem 0;
            font-weight: 400;
        }

        .badge {
            background: #eef2ff;
            border-radius: 40px;
            padding: 0.2rem 0.9rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c5a7a;
            display: inline-block;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 1.5rem 0 1rem 0;
            border-left: 5px solid #7c3aed;
            padding-left: 0.8rem;
            color: #1f3b4c;
        }

        .question-item {
            background: #ffffff;
            border-radius: 1.2rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #e2edf7;
            transition: 0.2s;
        }

        .question-item:hover {
            background: #f5f3ff;
            border-color: #c4b5fd;
            box-shadow: 0 6px 16px rgba(44, 90, 122, 0.12);
        }

        .question-item.wrong-answer {
            background: #fff7f7;
            border-color: #fca5a5;
            box-shadow: 0 4px 14px rgba(220, 38, 38, 0.10);
        }

        .question-text {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 0.8rem;
            display: flex;
            gap: 10px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .q-type {
            font-size: 0.7rem;
            background: #ece5ff;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: normal;
            color: #5b21b6;
            border: 1px solid #d8b4fe;
        }

        .q-type-single,
        .q-type-multi,
        .q-type-tf,
        .q-type-scenario {
            background: #7c3aed;
            color: #ffffff;
            border-color: #6d28d9;
            font-weight: 600;
        }

        .options {
            margin: 0.8rem 0 0.6rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.45rem 0.6rem;
            border-radius: 0.65rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.16s;
        }

        .option-item:hover {
            background: #ede9fe;
            border-color: #a78bfa;
            box-shadow: inset 0 0 0 1px rgba(109, 40, 217, 0.18);
        }

        .option-item:active {
            background: #ddd6fe;
            border-color: #8b5cf6;
        }

        .option-item:has(input:checked) {
            background: #ddd6fe;
            border-color: #8b5cf6;
            box-shadow: inset 0 0 0 1px rgba(91, 33, 182, 0.24);
        }

        .option-item span {
            font-weight: 400;
        }

        .explanation {
            margin-top: 0.8rem;
            background: #f8fafc;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            border-left: 4px solid #94a3b8;
            color: #1e293b;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .exp-title {
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #4c1d95;
        }

        .answer-line {
            margin-bottom: 0.5rem;
            color: #4c1d95;
            font-weight: 700;
        }

        .exp-main {
            margin-bottom: 0.6rem;
        }

        .option-analysis {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 0.8rem;
            padding: 0.55rem 0.7rem;
            margin-top: 0.45rem;
            line-height: 1.55;
        }

        hr {
            margin: 0.5rem 0;
            border: none;
            border-top: 1px solid #cbdde9;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 1rem;
        }

        .quiz-toolbar {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            width: min(860px, calc(100% - 24px));
            z-index: 999;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e7ddff;
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            box-shadow: 0 14px 30px rgba(76, 29, 149, 0.18);
        }

        .progress-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.45rem;
            color: #5b21b6;
            font-weight: 600;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background: #efe7ff;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #8b5cf6);
            transition: width 0.25s ease;
        }

        button {
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            border: none;
            padding: 0.82rem 2rem;
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.2px;
            border-radius: 999px;
            color: white;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 10px 22px rgba(76, 29, 149, 0.26), inset 0 1px 0 rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.18);
        }

        button.secondary {
            background: linear-gradient(135deg, #6d28d9 0%, #7c3aed 100%);
        }

        button.warning {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
        }

        button:hover {
            transform: translateY(-2px) scale(1.01);
            filter: brightness(1.04);
            box-shadow: 0 14px 26px rgba(76, 29, 149, 0.3), inset 0 1px 0 rgba(255,255,255,0.24);
        }

        button:active {
            transform: translateY(0) scale(0.995);
            filter: brightness(0.99);
            box-shadow: 0 6px 14px rgba(76, 29, 149, 0.22), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        button:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.22), 0 10px 22px rgba(76, 29, 149, 0.26);
        }

        .score-area {
            background: linear-gradient(135deg, #faf5ff 0%, #f5f3ff 100%);
            border: 1px solid #ddd6fe;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            text-align: center;
            font-size: 1.28rem;
            font-weight: bold;
            margin-top: 1rem;
            color: #6b7280;
        }

        .score-value {
            color: #6d28d9;
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            display: inline-block;
            margin: 0 0.2rem;
        }

        .rank-area {
            margin-top: 1rem;
            background: #f8f1ff;
            border: 1px solid #ddd6fe;
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            text-align: center;
            color: #6b7280;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .rank-value {
            display: block;
            margin-top: 0.35rem;
            color: #6d28d9;
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1.25;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }

        .stat-chip {
            border-radius: 999px;
            padding: 0.35rem 0.8rem;
            font-size: 0.86rem;
            font-weight: 700;
        }

        .stat-chip.correct {
            background: #ecfdf3;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .stat-chip.wrong {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #c2410c;
        }

        .course-tag {
            margin-top: 0.9rem;
            text-align: center;
            color: #6d28d9;
            font-size: 0.94rem;
            font-weight: 600;
        }

        .comment {
            background: #ffffff;
            border: 1px solid #e9ddff;
            border-radius: 1.1rem;
            padding: 1.1rem 1.2rem;
            margin-top: 1rem;
            font-style: normal;
            color: #2f2d3a;
            line-height: 1.9;
            text-align: left;
        }

        .comment-title {
            font-weight: 700;
            color: #5b21b6;
            margin-bottom: 0.6rem;
            display: block;
        }

        .comment p {
            margin: 0 0 0.85rem 0;
        }

        .comment p:last-child {
            margin-bottom: 0;
        }

        .result-page {
            display: none;
        }

        .result-card {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 2.2rem;
        }

        .result-title {
            justify-content: center;
            text-align: center;
            width: 100%;
            margin-bottom: 0.6rem;
        }

        .result-sub {
            text-align: center;
            border-left: none;
            border-bottom: 2px solid #ddd6fe;
            display: inline-block;
            padding: 0 0 0.45rem 0;
            margin: 0 auto 1rem auto;
            width: 100%;
        }

        .result-sub-sep {
            margin: 0 0.35rem;
        }

        .result-meta {
            margin-top: 0.8rem;
            color: #6b7280;
            font-weight: 600;
            text-align: center;
        }

        .result-tip-bar {
            margin-top: 1.1rem;
            padding: 0.85rem 1rem;
            border-radius: 0.9rem;
            text-align: center;
            font-size: 0.98rem;
            font-weight: 700;
        }

        .result-tip-bar.pass {
            background: #ecfdf3;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .result-tip-bar.retry {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #c2410c;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #5e7e97;
        }

        @media (max-width: 640px) {
            .paper-card {
                padding: 1rem;
            }
            .cover-card.cover-visual-only {
                max-width: 100%;
            }
            .cover-input-layer {
                --cover-pad-x: 6%;
                --cover-pad-b: 18%;
            }
            .cover-card.cover-visual-only #enterExamBtn {
                width: 68%;
                min-width: 0;
            }
            .cover-card.cover-visual-only .student-form {
                max-width: 62%;
            }
            #examSection {
                padding-bottom: 135px;
            }
            .student-form {
                grid-template-columns: 1fr;
            }
            .quiz-toolbar {
                width: calc(100% - 16px);
                bottom: 10px;
                padding: 0.75rem 0.8rem;
            }
            .result-sub-sep {
                display: none;
            }
            .result-sub-break {
                display: block;
                margin-top: 0.2rem;
            }
            .exam-header h1 {
                display: block;
                text-align: center;
            }
            .exam-title-sep {
                display: none;
            }
            .exam-title-break {
                display: block;
                margin-top: 0.1rem;
            }
            .progress-head {
                font-size: 0.88rem;
            }
            .question-item {
                padding: 0.8rem;
            }
            button {
                padding: 0.5rem 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="coverSection" class="paper-card cover-card cover-visual-only">
        <div class="cover-brand-stack">
            <div class="brand-chip">AI时代的个人战略 · 探索营</div>
            <div class="cover-title">与AI同行</div>
            <div class="cover-subtitle">入门考试</div>
            <div class="cover-desc">这是一份课程探索任务测评，帮助你快速建立AI时代的基础认知、协作方法与安全判断力。</div>
            <div class="cover-meta-row">
                <span class="cover-meta-item">总分100分</span>
                <span class="cover-meta-item">60分达标</span>
                <span class="cover-meta-item">共27题</span>
            </div>
        </div>
        <div class="cover-art-wrap glass-glow">
            <img class="cover-art-img" src="封面页.png" alt="与AI同行 · 入门考试封面">
            <div class="cover-input-layer">
                <div class="student-form">
                    <div class="form-field">
                        <label for="studentName">姓名</label>
                        <input id="studentName" type="text" placeholder="姓名" autocomplete="name" enterkeyhint="next" inputmode="text">
                    </div>
                    <div class="form-field">
                        <label for="studentAge">年龄</label>

    function renderOptionAnalysis(options, correctValues, optionExplan = []) {
        const correctSet = new Set(Array.isArray(correctValues) ? correctValues : [correctValues]);
        const stripLeadingMark = (text = "") => String(text).replace(/^[✅❌]\s*/, "");
        return options.map(opt => {
            const letter = opt.charAt(0);
            const isCorrect = correctSet.has(letter);
            const reason = optionExplan.length
                ? stripLeadingMark(optionExplan[options.indexOf(opt)])
                : (isCorrect
                ? "该选项符合题干要求，是本题应选择的关键点。"
                : "该选项与题干核心不一致，或带有常见误区，不应选择。");
            return `<div class="option-analysis">${isCorrect ? '✅' : '❌'} <strong>${opt}</strong><br>${reason}</div>`;
        }).join('');
    }

            : "本题不应选“错误”，因为题干描述本身是成立的。";
        return `
            <div class="option-analysis">${correctVal ? '✅' : '❌'} <strong>正确</strong><br>${trueReason}</div>
            <div class="option-analysis">${!correctVal ? '✅' : '❌'} <strong>错误</strong><br>${falseReason}</div>
        `;
    }

    function renderExplanationBlock(answerText, summaryText, optionAnalysisHtml) {
        return `
            <div class="exp-title">📖 详细解析</div>
            <div class="answer-line">正确答案：${answerText}</div>
            <div class="exp-main">${summaryText}</div>
            ${optionAnalysisHtml}
        `;
    }

    // 构建试卷HTML
    function buildForm() {
        let html = `<div class="paper-card glass-glow"><div class="section-title">📌 一、单选题（每题3分，共30分）</div>`;
        singleChoice.forEach((q, idx) => {
            html += `
                <div class="question-item" data-qtype="single" data-idx="${idx}" data-correct="${q.correct}">
                    <div class="question-text"><span class="q-type q-type-single">单选</span> ${idx+1}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map(opt => `<div class="option"><label class="option-item"><input type="radio" name="single_${idx}" value="${opt.charAt(0)}"><span>${opt}</span></label></div>`).join('')}
                    </div>
                    <div class="explanation" id="exp_single_${idx}">
                        ${renderExplanationBlock(
                            q.correct,
                            q.explanation || "请结合下方选项逐条理解本题。",
                            renderOptionAnalysis(q.options, q.correct, q.optionExplan)
                        )}
                    </div>
                </div>
            `;
        });
        html += `<div class="section-title">🔍 二、多选题（每题6分，共30分，全对才得分）</div>`;
        multiChoice.forEach((q, idx) => {
            const correctStr = JSON.stringify(q.correct.sort());
            html += `
                <div class="question-item" data-qtype="multi" data-idx="${idx}" data-correct='${JSON.stringify(q.correct)}'>
                    <div class="question-text"><span class="q-type q-type-multi">多选</span> ${idx+1}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map(opt => `<div class="option"><label class="option-item"><input type="checkbox" name="multi_${idx}" value="${opt.charAt(0)}"><span>${opt}</span></label></div>`).join('')}
                    </div>
                    <div class="explanation" id="exp_multi_${idx}">
                        ${renderExplanationBlock(
                            q.correct.join("、"),
                            q.explanation || "本题为多选题，请重点看每个选项为什么该选或不该选。",
                            renderOptionAnalysis(q.options, q.correct, q.optionExplan)
                        )}
                    </div>
                </div>
            `;
        });
        html += `<div class="section-title">⚖️ 三、判断题（每题3分，共30分）</div>`;
        trueFalse.forEach((q, idx) => {
            html += `
                <div class="question-item" data-qtype="tf" data-idx="${idx}" data-correct="${q.correct}">
                    <div class="question-text"><span class="q-type q-type-tf">判断</span> ${idx+1}. ${q.text}</div>
                    <div class="options">
                        <div class="option"><label class="option-item"><input type="radio" name="tf_${idx}" value="true"><span>正确</span></label></div>
                        <div class="option"><label class="option-item"><input type="radio" name="tf_${idx}" value="false"><span>错误</span></label></div>
                    </div>
                    <div class="explanation" id="exp_tf_${idx}">
                        ${renderExplanationBlock(
                            q.correct ? "正确" : "错误",
                            q.explanation,
                            renderTfOptionAnalysis(q.correct, q.optionExplan)
                        )}
                    </div>
                </div>
            `;
        });
        html += `<div class="section-title">🎭 四、情景选择题（每题5分，共10分）</div>`;
        scenarioChoice.forEach((q, idx) => {
            html += `
                <div class="question-item" data-qtype="scenario" data-idx="${idx}" data-correct="${q.correct}">
                    <div class="question-text"><span class="q-type q-type-scenario">情景</span> ${idx+1}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map(opt => `<div class="option"><label class="option-item"><input type="radio" name="scenario_${idx}" value="${opt.charAt(0)}"><span>${opt}</span></label></div>`).join('')}
                    </div>
                    <div class="explanation" id="exp_scenario_${idx}">
                        ${renderExplanationBlock(
                            q.correct,
                            q.explanation || "请先判断最稳妥做法，再对照每个选项的风险点。",
                            renderOptionAnalysis(q.options, q.correct, q.optionExplan)
                        )}
                    </div>
                </div>
            `;
        });
        document.getElementById('quizForm').innerHTML = html;
    }

    let latestWrongExplanationIds = [];
    const TOTAL_QUESTIONS = singleChoice.length + multiChoice.length + trueFalse.length + scenarioChoice.length;

    function getAnsweredCount() {
        let answered = 0;
        for(let i=0; i<singleChoice.length; i++) {
            if(document.querySelector(`input[name="single_${i}"]:checked`)) answered++;
        }
        for(let i=0; i<multiChoice.length; i++) {
            if(document.querySelector(`input[name="multi_${i}"]:checked`)) answered++;
        }
        for(let i=0; i<trueFalse.length; i++) {
            if(document.querySelector(`input[name="tf_${i}"]:checked`)) answered++;
        }
        for(let i=0; i<scenarioChoice.length; i++) {
            if(document.querySelector(`input[name="scenario_${i}"]:checked`)) answered++;
        }
        return answered;
    }

    function updateProgressUI() {
        const answered = getAnsweredCount();
        const progress = Math.round((answered / TOTAL_QUESTIONS) * 100);
        document.getElementById('progressText').textContent = `${answered} / ${TOTAL_QUESTIONS} 已完成`;
        document.getElementById('progressFill').style.width = `${progress}%`;
    }

    // 轻量音效：hover 与选择时的反馈音
    let audioCtx = null;
    let lastHoverToneAt = 0;
    function getAudioCtx() {
        if(!audioCtx) {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if(!Ctx) return null;
            audioCtx = new Ctx();
        }
        return audioCtx;
    }

    function playUiTone(type = "hover") {
        const ctx = getAudioCtx();
        if(!ctx) return;
        const now = Date.now();
        if(type === "hover" && now - lastHoverToneAt < 90) return;
        if(type === "hover") lastHoverToneAt = now;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = type === "select" ? 720 : 520;
        gain.gain.value = 0.0001;

        osc.connect(gain);
        gain.connect(ctx.destination);

        const t = ctx.currentTime;
        gain.gain.exponentialRampToValueAtTime(type === "select" ? 0.035 : 0.02, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + (type === "select" ? 0.11 : 0.08));
        osc.start(t);
        osc.stop(t + (type === "select" ? 0.12 : 0.09));
    }

    function bindOptionAudioFeedback() {
        const optionItems = document.querySelectorAll('.option-item');
        optionItems.forEach(item => {
            item.addEventListener('mouseenter', () => playUiTone("hover"));
            item.addEventListener('click', () => playUiTone("select"));
        });
    }

    // 计算分数并展示结果
    function computeScore() {
        const unansweredCount = TOTAL_QUESTIONS - getAnsweredCount();
        if(unansweredCount > 0) {
            const proceed = window.confirm(`还有 ${unansweredCount} 题未作答，确认现在交卷吗？`);
            if(!proceed) return;
        }

        let total = 0;
        let correctCount = 0;
        latestWrongExplanationIds = [];
        const allQuestionItems = document.querySelectorAll('.question-item');
        allQuestionItems.forEach(item => item.classList.remove('wrong-answer'));
        // 1. 单选
        for(let i=0; i<singleChoice.length; i++) {
            const selected = document.querySelector(`input[name="single_${i}"]:checked`);
            const isCorrect = !!selected && selected.value === singleChoice[i].correct;
            if(isCorrect) {
                total += 3;
                correctCount++;
            }
            else {
                latestWrongExplanationIds.push(`exp_single_${i}`);
                document.querySelector(`.question-item[data-qtype="single"][data-idx="${i}"]`)?.classList.add('wrong-answer');
            }
        }
        // 2. 多选
        for(let i=0; i<multiChoice.length; i++) {
            const checkboxes = document.querySelectorAll(`input[name="multi_${i}"]:checked`);
            const selectedVals = Array.from(checkboxes).map(cb => cb.value).sort();
            const correctVals = multiChoice[i].correct.slice().sort();
            let isFullCorrect = (selectedVals.length === correctVals.length && selectedVals.every((v,idx) => v === correctVals[idx]));
            if(isFullCorrect) {
                total += 6;
                correctCount++;
            }
            else {
                latestWrongExplanationIds.push(`exp_multi_${i}`);
                document.querySelector(`.question-item[data-qtype="multi"][data-idx="${i}"]`)?.classList.add('wrong-answer');
            }
        }
        // 3. 判断
        for(let i=0; i<trueFalse.length; i++) {
            const selected = document.querySelector(`input[name="tf_${i}"]:checked`);
            const isCorrect = !!selected && ((selected.value === 'true') === trueFalse[i].correct);
            if(isCorrect) {
                total += 3;
                correctCount++;
            }
            else {
                latestWrongExplanationIds.push(`exp_tf_${i}`);
                document.querySelector(`.question-item[data-qtype="tf"][data-idx="${i}"]`)?.classList.add('wrong-answer');
            }
        }
        // 4. 情景
        for(let i=0; i<scenarioChoice.length; i++) {
            const selected = document.querySelector(`input[name="scenario_${i}"]:checked`);
            const isCorrect = !!selected && selected.value === scenarioChoice[i].correct;
            if(isCorrect) {
                total += 5;
                correctCount++;
            }
            else {
                latestWrongExplanationIds.push(`exp_scenario_${i}`);
                document.querySelector(`.question-item[data-qtype="scenario"][data-idx="${i}"]`)?.classList.add('wrong-answer');
            }
        }

        // 分数阶梯：称号 + 长评语（诙谐但鼓励）
        let rank = "";
        let rankName = "";
        let comment = "";
        if(total >= 95) {
            rankName = "AI星际领航官";
            comment = "《道德经》说：'知人者智，自知者明。' 你这成绩已经不是“会用AI”，而是能把AI安排得明明白白。提问有章法，判断有主见，关键时刻还会核实信息，稳得像上了三道保险。继续保持这节奏，你不只是跟上AI时代，你是在定义自己的效率上限。";
        } else if(total >= 85) {
            rankName = "AI协作指挥官";
            comment = "《孙子兵法》讲：'知己知彼，百战不殆。' 你已经掌握了和AI合作的核心套路，不是把AI当算命先生，而是当高效实习生来用。再往上冲的关键，是把提问再结构化一些，背景、目标、格式一次说清，AI的发挥会更稳。照这个状态继续，你很快就会从“会用工具”升级成“会设计流程”的人。";
        } else if(total >= 75) {
            rankName = "AI进阶探索家";
            comment = "《礼记》云：'教学相长也。' 你已经过了“新手乱点按钮”的阶段，开始思考怎么问更好、怎么用更稳。现在最适合做的是把三个习惯固定下来：重要事实先核实、关键内容再润色、最终决策自己拍板。别小看这三步，它能让你避开大多数翻车现场。继续保持，你离高手只差几次高质量实战。";
        } else if(total >= 60) {
            rankName = "AI潜力实战员";
            comment = "恭喜及格！《荀子》曰：'不积跬步，无以至千里。' 你已经拿到“与AI同行”的入场券。这个阶段最关键的不是追求满分，而是把“会用一次”变成“次次用对”。建议从三个小动作开始：提问前说清目标，看到事实先核实，把AI回答当初稿自己再改改。你现在就像刚拿驾照的新司机，多练几圈，路线会越来越熟，信心也会越来越足。";
        } else if(total >= 40) {
            rankName = "AI起步侦察员";
            comment = "《论语》说：'知之为知之，不知为不知，是知也。' 你已经推开门了，谁还没被AI一本正经地忽悠过呢？关键是你愿不愿意建立自己的判断力。建议下一轮重点关注三件事：AI能做什么、不能做什么、我该怎么验证它。把这三个点练熟，分数准涨。把这次当热身赛，你已经在路上了，而且是很有希望冲到前排的那种。";
        } else {
            rankName = "AI新手村冒险者";
            comment = "《诗经》云：'如切如磋，如琢如磨。' 先给你鼓个掌：愿意来做这份题，本身就比“围观但不行动”厉害。分数不理想没关系，认真看完每道题解析再做第二遍，你会明显感到“原来是这么回事”。接下来和AI聊天时，记得多给背景、多要例子、遇到关键事实先核实。把今天当起点，而不是终点，冲就完了。";
        }

        rank = `恭喜你，获得称号：<span class="rank-value">${rankName}</span>`;

        const percent = total;
        document.getElementById('resultStudentInfo').textContent = document.getElementById('studentInfo').textContent;
        document.getElementById('scoreDisplay').innerHTML = `本次得分：<span class="score-value">${percent}</span> 分`;
        document.getElementById('rankDisplay').innerHTML = rank;
        document.getElementById('resultStats').innerHTML = `
            <span class="stat-chip correct">答对 ${correctCount} 题</span>
            <span class="stat-chip wrong">答错 ${TOTAL_QUESTIONS - correctCount} 题</span>
        `;
        const commentParagraphs = comment
            .split("。")
            .map(part => part.trim())
            .filter(Boolean)
            .reduce((groups, sentence, idx) => {
                const groupIndex = Math.floor(idx / 3);
                if(!groups[groupIndex]) groups[groupIndex] = [];
                groups[groupIndex].push(`${sentence}。`);
                return groups;
            }, [])
            .map(group => `<p>${group.join("")}</p>`)
            .join("");
        document.getElementById('commentDisplay').innerHTML = `<span class="comment-title">💬 成长评语</span>${commentParagraphs}`;
        const resultTipBar = document.getElementById('resultTipBar');
        if(percent >= 60) {
            resultTipBar.className = "result-tip-bar pass";
            resultTipBar.textContent = "已达标，太棒了！";
        } else {
            resultTipBar.className = "result-tip-bar retry";
            resultTipBar.textContent = "继续加油，再来一次会更好！";
        }
        document.getElementById('examSection').style.display = 'none';
        document.getElementById('resultSection').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 进入考试：校验姓名和年龄，展示试卷区域
    function enterExam() {
        const nameInput = document.getElementById('studentName');
        const ageInput = document.getElementById('studentAge');
        const entryTip = document.getElementById('entryTip');

        const name = nameInput.value.trim();
        const age = parseInt(ageInput.value, 10);

        if(!name) {
            entryTip.textContent = "请先输入姓名后再进入考试。";
            nameInput.focus();
            return;
        }
        if(Number.isNaN(age) || age < 1 || age > 120) {
            entryTip.textContent = "请输入有效年龄（1-120岁）。";
            ageInput.focus();
            return;
        }

        entryTip.textContent = "";
        document.getElementById('studentInfo').textContent = `学员信息：${name} ｜ ${age}岁`;
        document.getElementById('coverSection').style.display = 'none';
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('examSection').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 重置所有选项 & 隐藏解析区域 & 隐藏结果
    function resetQuiz() {
        const allInputs = document.querySelectorAll('#quizForm input');
        allInputs.forEach(input => {
            if(input.type === 'radio' || input.type === 'checkbox') input.checked = false;
        });
        const allExplanations = document.querySelectorAll('.explanation');
        allExplanations.forEach(exp => exp.classList.remove('show'));
        const allQuestionItems = document.querySelectorAll('.question-item');
        allQuestionItems.forEach(item => item.classList.remove('wrong-answer'));
        document.getElementById('resultSection').style.display = 'none';
        latestWrongExplanationIds = [];
        updateProgressUI();
    }

    // 从结果页查看解析（返回试卷并展开全部解析）
    function viewExplanationsFromResult() {
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('examSection').style.display = 'block';
        const exps = document.querySelectorAll('.explanation');
        exps.forEach(exp => exp.classList.add('show'));
        allExpVisible = true;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 从结果页重新答题（清空作答后返回试卷）
    function retryFromResult() {
        resetQuiz();
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('examSection').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 切换所有解析显示/隐藏
    let allExpVisible = false;
    function toggleAllExplanations() {
        const exps = document.querySelectorAll('.explanation');
        if(!allExpVisible) {
            exps.forEach(exp => exp.classList.add('show'));
            allExpVisible = true;
        } else {
            exps.forEach(exp => exp.classList.remove('show'));
            allExpVisible = false;
        }
    }

    // 初始化事件绑定
    window.onload = () => {
        buildForm();
        bindOptionAudioFeedback();
        updateProgressUI();
        document.getElementById('quizForm').addEventListener('change', updateProgressUI);
        document.getElementById('enterExamBtn').addEventListener('click', enterExam);
        document.getElementById('submitBtn').addEventListener('click', computeScore);
        document.getElementById('resetBtn').addEventListener('click', resetQuiz);
        document.getElementById('toggleExplainBtn').addEventListener('click', toggleAllExplanations);
        document.getElementById('viewExplainBtn').addEventListener('click', viewExplanationsFromResult);
        document.getElementById('retryFromResultBtn').addEventListener('click', retryFromResult);
    };
</script>
</body>
</html>
